{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Add notes</title>
        <link rel="stylesheet" href="{% static 'header.css' %}">
        <link rel="stylesheet" href="{% static 'addnote.css' %}">
    </head>

    <body>
        <div class="header">
            <div class="left-side">
                <div id="logo">
                    <a href="{% url 'homepage' %}">
                        <img src="{% static 'assets/logo.png' %}">
                    </a>
                </div>
                <div id="tittle">
                    <p>NoteNet</p>
                </div>
            </div>
            <div class="right-side">
                <span class="search-icon"></span>
                <input type="search" class="searchbox">
                <div class="profile">
                    <a href="{% url 'profile' %}">
                        <img class="icon" src="{% static 'assets/profile.png'%}">
                    </a>
               </div>
               <input type="checkbox" id="menu-toggle">
               <label class="hamburger-label" for="menu-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
               </label>
               <div class="popup-menu">
                   <label class="close-menu" for="menu-toggle">&#x2715;</label>
                   <a href="{% url 'homepage' %}">Homepage</a>
                   <a href="{% url 'materials' %}">Materials</a>
                   <a href="{% url 'addnote' %}">Add notes</a>
                   <a href="{% url 'myclass' %}">My class</a>
                   <a href="{% url 'profile' %}">My profile</a>
               </div>
            </div>
        </div>

        <div class="left-side">
                   
            <div class="auth-card">
                <h1>Add notes</h1>

                <form method="post" action="{% url 'addnote' %}">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="note-class">Class</label>
                        <input
                            type="text"
                            id="note-class"
                            name="class"
                            placeholder="e.g. 10"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="note-letter">Letter</label>
                        <select id="note-letter" name="letter" required>
                            <option value="" disabled selected>e.g A</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="note-subject">Subject</label>
                        <input
                            type="text"
                            id="note-subject"
                            name="subject"
                            placeholder="e.g. Maths"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="note-date">Date</label>
                        <input
                            type="date"
                            id="note-date"
                            name="date"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-submit">Add Note</button>
                </form>
            </div>
        </div>
        </div>

        <div class="right-side">

        </div>

    </body>
</html>
