{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Sign Up — NoteNet</title>
        <link rel="stylesheet" href="{% static 'header.css' %}">
        <link rel="stylesheet" href="{% static 'auth.css' %}">
    </head>

    <body>
        <div class="header">
            <div class="left-side">
                <div id="logo">
                    <a href="{% url 'homepage' %}">
                        <img src="{% static 'assets/logo.png' %}">
                    </a>
                </div>
                <div id="tittle">
                    <p>NoteNet</p>
                </div>
            </div>
            <div class="right-side">
                <div class="profile">
                    <a href="{% url 'profile' %}">
                        <img class="icon" src="{% static 'assets/profile.png'%}">
                    </a>
                </div>
                <input type="checkbox" id="menu-toggle">
                <label class="hamburger-label" for="menu-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <div class="popup-menu">
                    <label class="close-menu" for="menu-toggle">&#x2715;</label>
                    <a href="{% url 'homepage' %}">Homepage</a>
                    <a href="{% url 'materials' %}">Materials</a>
                    <a href="{% url 'myclass' %}">My class</a>
                    <a href="{% url 'profile' %}">My profile</a>
                </div>
            </div>
        </div>

        <div class="auth-wrapper">
            <div class="login-box">
                <h1 class="welcome">Create account</h1>
                <form method="post" action="{% url 'signup' %}">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="signup-username" class="form-tittle">Username</label>
                        <input
                            type="text"
                            id="signup-username"
                            name="username"
                            placeholder="Choose a username"
                            autocomplete="username"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signup-email" class="form-tittle">Email <span style="font-weight:normal; color:#aaa;">(optional)</span></label>
                        <input
                            type="email"
                            id="signup-email"
                            name="email"
                            placeholder="your@email.com"
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label for="signup-password1" class="form-tittle">Password</label>
                        <input
                            type="password"
                            id="signup-password1"
                            name="password1"
                            placeholder="Create a password"
                            autocomplete="new-password"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signup-password2" class="form-tittle">Confirm Password</label>
                        <input
                            type="password"
                            id="signup-password2"
                            name="password2"
                            placeholder="Repeat your password"
                            autocomplete="new-password"
                            required
                        >
                    </div>

                    <button type="submit" class="button-submit">Sign Up</button>
                </form>

                <p class="switch">
                    Already have an account? <a href="{% url 'login' %}">Log in</a>
                </p>
            </div>
        </div>
    </body>
</html>
