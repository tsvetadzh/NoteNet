{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Log In — NoteNet</title>
        <meta name="description" content="Log in to your NoteNet account to access your notes and class materials.">
        <link rel="stylesheet" href="{% static 'header.css' %}">
        <link rel="stylesheet" href="{% static 'auth.css' %}">
    </head>

    <body>
        <!-- ── Header ───────────────────────────── -->
        <div class="header">
            <div class="left-side">
                <div id="logo">
                    <a href="{% url 'homepage' %}">
                        <img src="{% static 'assets/logo.png' %}">
                    </a>
                </div>
                <div id="tittle">
                    <p>NoteNet</p>
                </div>
            </div>
            <div class="right-side">
                <span class="search-icon"></span>
                <input type="search" class="searchbox">
                <div class="profile">
                    <a href="{% url 'profile' %}">
                        <img class="icon" src="{% static 'assets/profile.png'%}">
                    </a>
                </div>
                <input type="checkbox" id="menu-toggle">
                <label class="hamburger-label" for="menu-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <div class="popup-menu">
                    <a href="{% url 'homepage' %}">Homepage</a>
                    <a href="{% url 'materials' %}">Materials</a>
                    <a href="{% url 'addnote' %}">Add notes</a>
                    <a href="{% url 'myclass' %}">My class</a>
                    <a href="{% url 'profile' %}">My profile</a>
                </div>
            </div>
        </div>

        <!-- ── Login card ────────────────────────── -->
        <div class="auth-wrapper">
            <div class="auth-card">
                <h1>Welcome back</h1>
                <p class="subtitle">Log in to your NoteNet account</p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="error-msg">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input
                            type="text"
                            id="login-username"
                            name="username"
                            placeholder="Enter your username"
                            autocomplete="username"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input
                            type="password"
                            id="login-password"
                            name="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-submit">Log In</button>
                </form>

                <p class="auth-switch">
                    Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
                </p>
            </div>
        </div>
    </body>
</html>
