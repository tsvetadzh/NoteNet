{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Log In</title>
        <link rel="stylesheet" href="{% static 'header.css' %}">
        <link rel="stylesheet" href="{% static 'auth.css' %}">
    </head>

    <body>
        <div class="header">
            <div class="left-side">
                <div id="logo">
                    <a href="{% url 'homepage' %}">
                        <img src="{% static 'assets/logo.png' %}">
                    </a>
                </div>
                <div id="tittle">
                    <p>NoteNet</p>
                </div>
            </div>
            <div class="right-side">
                <div class="profile">
                    <a href="{% url 'profile' %}">
                        <img class="icon" src="{% static 'assets/profile.png'%}">
                    </a>
                </div>
                <input type="checkbox" id="menu-toggle">
                <label class="hamburger-label" for="menu-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
                <div class="popup-menu">
                    <label class="close-menu" for="menu-toggle">&#x2715;</label>
                    <a href="{% url 'homepage' %}">Homepage</a>
                    <a href="{% url 'materials' %}">Materials</a>
                    <a href="{% url 'myclass' %}">My class</a>
                    <a href="{% url 'profile' %}">My profile</a>
                </div>
            </div>
        </div>

        <div class="auth-wrapper">
            <div class="login-box">
                <h1 class ="welcome">Welcome back</h1>
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="form-group">
                        <p class="subtitle">Username</p>
                        <input
                            type="text"
                            id="login-username"
                            name="username"
                            placeholder="Enter your username"
                        >
                    </div>

                    <div class="form-group">
                        <label class="subtitle">Password</label>
                        <input
                            type="password"
                            id="login-password"
                            name="password"
                            placeholder="Enter your password"
                        >
                    </div>

                    <button type="submit" class="button-submit">Log In</button>
                </form>

                <p class="switch">
                    Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
                </p>
            </div>
        </div>
    </body>
</html>
