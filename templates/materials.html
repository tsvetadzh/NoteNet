{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>Materials</title>
        <link rel="stylesheet" href="{% static 'header.css' %}">
        <link rel="stylesheet" href="{% static 'materials.css' %}">
    </head>

    <body>
        <div class="header">
            <div class="left-side">
                <div id="logo"><img src="{% static 'assets/logo.png' %}"></div>
                <div id="tittle"><p>NoteNet</p></div>
            </div>
            <div class="right-side">
               <input type="checkbox" id="menu-toggle">
               <label class="hamburger-label" for="menu-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
               </label>
               <div class="popup-menu">
                   <a href="{% url 'homepage' %}">Homepage</a>
                   <a href="{% url 'materials' %}">Materials</a>
                   <a href="{% url 'addnote' %}">Add notes</a>
                   <a href="{% url 'myclass' %}">My class</a>
                   <a href="{% url 'profile' %}">My profile</a>
               </div>
            </div>
        </div>

        <div class="choose">
                <p>Choose a grade:</p>
        </div>

        <div class="main-part">
            <div class="grade">
                <img 
                    src="{% static 'assets/eight.png' %}" 
                    class="grade-img"
                >
                <a href="{% url 'class_eight'%}">
                    <p class="grade-name">
                        8th grade
                    </p>
                </a>
            </div>

            <div class="grade">
                <img 
                    src="{% static 'assets/nine.png' %}" 
                    class="grade-img"
                >
                <a class="nine-text" href="{% url 'class_nine'%}">
                    <p class="grade-name">
                        9th grade
                    </p>
                </a>
                </a>
            </div>

            <div class="grade">
                <img 
                    src="{% static 'assets/ten.png' %}" 
                    class="grade-img"
                >
                <a class="ten-text" href="{% url 'class_ten'%}">
                    <p class="grade-name">
                        10th grade
                    </p>
                </a>
            </div>

            <div class="grade">
                <img 
                    src="{% static 'assets/eleven.png' %}" 
                    class="grade-img"
                >
                <a class="eleven-text" href="{% url 'class_eleven'%}">
                    <p class="grade-name">
                        11th grade
                    </p>
                </a>
            </div>

            <div class="grade">
                <img 
                    src="{% static 'assets/twelve.png' %}" 
                    class="grade-img"
                >
                <a class="twelve-text" href="{% url 'class_twelve'%}">
                    <p class="grade-name">
                        12th grade
                    </p>
                </a>
            </div>
        </div>
    </body>
</html>
